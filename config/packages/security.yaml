security:
    # https://symfony.com/doc/current/security.html#registering-the-user-hashing-passwords
    password_hashers:
        Symfony\Component\Security\Core\User\PasswordAuthenticatedUserInterface: 'auto'

    # https://symfony.com/doc/current/security.html#loading-the-user-the-user-provider
    providers:
        app_user_provider:
            entity:
                class: App\Entity\User
                property: email

        app_team_user_provider:
            id: App\Security\TeamUserProvider

        chain_provider:
            chain:
                providers: [ app_user_provider, app_team_user_provider ]

    firewalls:
        dev:
            # Ensure dev tools and static assets are always allowed
            pattern: ^/(_profiler|_wdt|assets|build)/
            security: false
        main:
            lazy:     true
            provider: chain_provider

            form_login:
                login_path:                     user_login
                check_path:                     user_login
                username_parameter:             _username
                password_parameter:             _password
                csrf_parameter:                 _csrf_token
                enable_csrf:                    true
                default_target_path:            race_index
                always_use_default_target_path: false

            custom_authenticators:
                - App\Security\TeamTokenAuthenticator

            # Admins können sich als Team einloggen (impersonieren)
            # Admin:     GET /irgendwas?_switch_user=AB3K7P2X
            # Beenden:   GET /irgendwas?_switch_user=_exit
            switch_user:
                role:      ROLE_ADMIN   # nur echte Admins dürfen impersonieren
                parameter: _switch_user

            remember_me:
                secret:   '%kernel.secret%'
                lifetime: 604800    # 7 Tage
                path:     /

            logout:
                path:   logout
                target: user_login

    # Note: Only the *first* matching rule is applied
    access_control:
        # Öffentlich
        - { path: ^/login,      roles: PUBLIC_ACCESS }
        - { path: ^/team-login, roles: PUBLIC_ACCESS }

        # Team-Score-Seite: eigenes Team (ROLE_TEAM) ODER Admin (ROLE_ADMIN)
        # Wenn Admin impersoniert hat er ROLE_TEAM + ROLE_PREVIOUS_ADMIN → greift auch
        - { path: '^/races/\d+/teams/[A-Z0-9]{8}', roles: [ROLE_TEAM, ROLE_ADMIN] }
        - { path: ^/logout, roles: [ROLE_TEAM, ROLE_ADMIN] }

        # Alles andere: nur Admins
        - { path: ^/, roles: ROLE_ADMIN }

    role_hierarchy:
        # ROLE_ADMIN beinhaltet ROLE_USER — User-Entity braucht keine extra Rolle
        ROLE_ADMIN: [ ROLE_USER ]

when@test:
    security:
        password_hashers:
            # Password hashers are resource-intensive by design to ensure security.
            # In tests, it's safe to reduce their cost to improve performance.
            Symfony\Component\Security\Core\User\PasswordAuthenticatedUserInterface:
                algorithm: auto
                cost: 4 # Lowest possible value for bcrypt
                time_cost: 3 # Lowest possible value for argon
                memory_cost: 10 # Lowest possible value for argon
