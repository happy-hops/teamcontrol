server {
    listen 80;
    server_name _;

    root /var/www/public;

    # RabbitMQ-Auth-Callbacks intern über HTTP, ohne Redirect
    location /rabbit-auth/ {
        fastcgi_pass php:9000;
        include fastcgi_params;
        fastcgi_param SCRIPT_FILENAME $document_root/index.php;
        fastcgi_param DOCUMENT_ROOT $document_root;
    }

    # alles andere auf HTTPS
    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    server_name vizor.local;

    ssl_certificate     /etc/nginx/certs/tc.local.pem;
    ssl_certificate_key /etc/nginx/certs/tc.local-key.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;

    root /var/www/public;
    index index.php;

    # Nginx health check endpoint
    location = /nginx-health {
        access_log off;
        return 200 "ok";
    }

    location / {
        try_files $uri /index.php$is_args$args;
    }

    location ~ ^/index\.php(/|$) {
        fastcgi_pass php:9000;
        fastcgi_split_path_info ^(.+\.php)(/.*)$;
        include fastcgi_params;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        fastcgi_param DOCUMENT_ROOT $document_root;
        internal;
    }

    # Alle anderen PHP-Dateien blockieren
    location ~ \.php$ {
        return 404;
    }

    access_log /var/log/nginx/access.log;
    error_log  /var/log/nginx/error.log;
}
